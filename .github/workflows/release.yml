name: Sonatype Release

on:
  push:
    branches: [master]
    tags: ["*"]

# Cancel in-progress runs for the same branch/tag
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  JVM_VERSION: "zulu:25"

jobs:
  build-and-publish:
    runs-on: macos-latest

    name: ${{ startsWith(github.ref, 'refs/tags/') && 'Publish Tag as Release' || 'Publish Snapshot' }}

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false
      - uses: coursier/cache-action@v8
      - name: Import GPG key for signing the release
        uses: crazy-max/ghaction-import-gpg@v7
        with:
          gpg_private_key: ${{ secrets.GPG_PRIVATE_KEY }}
          passphrase: ${{ secrets.GPG_PASSPHRASE }}
      - uses: coursier/setup-action@v3.0.0
        with:
          jvm: ${{ env.JVM_VERSION }}
          apps: sbt
      - name: Publish all projects
        run: sbt ci-release
        env:
          # ISS-484: Kept in place pending a scope decision. The native-lib
          # gate (SgeNativeLibs.sgeValidateNativeLibs) reads native/* mappings
          # from on-disk sge-deps/native-components/target/{cross,release}/,
          # which NO release or CI step populates here — the libs live inside
          # the resolved pnm-provider-sge-* JARs, not those dirs. With the var
          # removed the gate sys.errors ("No native shared libraries found in
          # JAR mappings", SgeNativeLibs.scala:45) under CI=true, verified
          # locally. Making the gate real requires a provider-JAR extraction
          # step (build/CI change, out of this issue's scope) and a decision
          # on which platforms a release must validate. Do not drop this line
          # without that step in place.
          SGE_SKIP_NATIVE_VALIDATION: "true"
          SONATYPE_USERNAME: ${{ secrets.SONATYPE_USERNAME }}
          SONATYPE_PASSWORD: ${{ secrets.SONATYPE_PASSWORD }}
