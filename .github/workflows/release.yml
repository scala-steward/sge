name: Sonatype Release

on:
  push:
    branches: [master]
    tags: ["*"]
  # Snapshot publishing on PRs is intentional: it is the organization's mechanism
  # for testing cross-repository artifacts on CI. The job-level `if` below restricts
  # it to PRs opened by org members so external-fork PRs never publish (and never
  # receive the signing/Sonatype secrets). ISS-484.
  pull_request:
    branches: [master]

# Cancel in-progress runs for the same branch/tag
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  JVM_VERSION: "zulu:25"

jobs:
  build-and-publish:
    runs-on: macos-latest

    # Push events (master / tags) always run. Pull-request events publish a
    # snapshot ONLY when the PR author is an org member/owner/collaborator —
    # external-fork PRs must not publish, as that would expose the GPG/Sonatype
    # secrets. ISS-484.
    if: >-
      github.event_name != 'pull_request' ||
      contains(fromJSON('["OWNER", "MEMBER", "COLLABORATOR"]'), github.event.pull_request.author_association)

    name: ${{ startsWith(github.ref, 'refs/tags/') && 'Publish Tag as Release' || 'Publish Snapshot' }}

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false
      - uses: coursier/cache-action@v8
      - name: Import GPG key for signing the release
        uses: crazy-max/ghaction-import-gpg@v7
        with:
          gpg_private_key: ${{ secrets.GPG_PRIVATE_KEY }}
          passphrase: ${{ secrets.GPG_PASSPHRASE }}
      - uses: coursier/setup-action@v3.0.0
        with:
          jvm: ${{ env.JVM_VERSION }}
          apps: sbt
      - name: Publish all projects
        # Validate natives before publishing: sgeValidateNativeLibs checks that the
        # resolved pnm-provider-sge-* dependency (the JAR users resolve to get natives)
        # carries every binary its manifest promises for all desktop platforms. sbt runs
        # commands in sequence and aborts on the first failure, so a gap blocks ci-release.
        # No skip flag — nothing unvalidated reaches Sonatype.
        # sbt 2.0 joins multiple CLI args into ONE command line (so
        # `sbt "a" "b"` parses as `a b` and fails); sequence with `;` in a
        # single arg so native-lib validation runs before ci-release.
        run: sbt "sge / sgeValidateNativeLibs; ci-release"
        env:
          SONATYPE_USERNAME: ${{ secrets.SONATYPE_USERNAME }}
          SONATYPE_PASSWORD: ${{ secrets.SONATYPE_PASSWORD }}
