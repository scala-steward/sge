name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

# Cancel in-progress runs for the same branch/PR
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  # Zulu 25 — Panama FFM stable since JDK 22, all 6 desktop platforms
  # including Windows aarch64 (which Temurin 25 lacks).
  # Same JDK used for release packaging (see demos/build.sbt jdkUrls).
  JVM_VERSION: "zulu:25.0.3"
  JAVA_VERSION: "25"
  JAVA_DISTRIBUTION: "zulu"
  NODE_VERSION: "24"

jobs:
  # ─── Scalafmt check ────────────────────────────────────────────────

  format:
    name: Scalafmt check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false

      - uses: coursier/setup-action@v3.0.0
        with:
          jvm: ${{ env.JVM_VERSION }}
          apps: sbt

      - name: Check formatting
        run: sbt "scalafmtCheckAll; scalafmtSbtCheck"

  # ─── re-scale enforce gate (covenant verify + shortcut budget) ──────
  #
  # BLOCKING (ISS-483). Validates that every file with a `Covenant: full-port`
  # header still passes (no method dropped, no shortcut introduced) and that no
  # new shortcut markers leaked into covenanted files.
  #
  # The campaign starts with a large backlog of covenant/shortcut failures
  # (193 file+kind pairs as of 2026-06-10) that is the open remediation work.
  # Rather than block on the whole backlog (CI would be permanently red) or use
  # a count gate (one new failure could hide behind one fixed file), the gate is
  # a SET-BASED RATCHET: .rescale/scripts/covenant-gate.sh recomputes the live
  # failing set and fails iff any live (file, kind) pair is absent from the
  # committed baseline (.rescale/data/covenant-gate-baseline.tsv). Fixed files
  # are reported as "shrink — update the baseline" but never fail the gate;
  # baseline shrinks are applied manually by the orchestrator.

  enforce:
    name: re-scale enforce
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false

      - uses: coursier/setup-action@v3.0.0
        with:
          jvm: ${{ env.JVM_VERSION }}
          apps: sbt

      - name: Install Scala Native deps
        run: |
          sudo apt-get update
          sudo apt-get install -y clang

      - name: Install re-scale
        run: |
          set -euo pipefail
          # Pin to the SAME tag the local dev install + the committed covenant-gate
          # baseline were built with (0.1.5). Cloning latest master made the gate
          # non-reproducible: re-scale's covenant method-set/shortcut computation
          # drifts between releases, so files clean locally were flagged on CI
          # (and vice versa) with no way to reconcile. A pinned gate is a real gate.
          git clone --depth=1 --branch 0.1.5 https://github.com/kubuszok/re-scale.git "$RUNNER_TEMP/re-scale"
          cd "$RUNNER_TEMP/re-scale"
          sbt install
          echo "$RUNNER_TEMP/re-scale/bin" >> "$GITHUB_PATH"

      - name: Print re-scale version
        run: re-scale version

      - name: Covenant + shortcut ratchet gate
        run: .rescale/scripts/covenant-gate.sh

  # ─── Scala.js compile + test (pure Scala, no native dependencies) ───

  test-js:
    name: Scala.js tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false

      - uses: coursier/setup-action@v3.0.0
        with:
          jvm: ${{ env.JVM_VERSION }}
          apps: sbt

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      # The Scala.js unit tests run under the jsdom jsEnv; jsdom (+ rapier compat)
      # are declared in package.json but must be installed into node_modules, or
      # the JS env aborts with "Cannot find module 'jsdom'" (RunTerminatedException).
      - name: Install JS test deps (jsdom)
        run: npm ci

      - name: Run Scala.js tests (core + all extensions)
        run: sbt test-js-3

      - name: Test scaladoc generation (non-blocking)
        continue-on-error: true
        run: sbt 'sge/doc'

  # ─── JVM compile + test (uses Panama provider JARs) ─────────────────

  test-jvm:
    name: JVM tests (${{ matrix.label }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            label: linux-x86_64
            platform: linux-x86_64
          - os: ubuntu-24.04-arm
            label: linux-aarch64
            platform: linux-aarch64
          - os: macos-latest
            label: macos-x86_64
            platform: macos-x86_64
            architecture: x64
          - os: macos-latest
            label: macos-aarch64
            platform: macos-aarch64
          - os: windows-latest
            label: windows-x86_64
            platform: windows-x86_64
          - os: windows-11-arm
            label: windows-aarch64
            platform: windows-aarch64
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false

      - uses: actions/setup-java@v4
        with:
          distribution: ${{ env.JAVA_DISTRIBUTION }}
          java-version: ${{ env.JAVA_VERSION }}
          cache: sbt
          architecture: ${{ matrix.architecture || '' }}

      - uses: sbt/setup-sbt@v1

      - name: Run JVM tests with coverage (core + all extensions)
        run: sbt ci-jvm-3

      - name: Upload coverage to Codecov
        if: always()
        # scoverage does not emit an aggregate report on Scala 3.8.x under sbt 2.0
        # (the report at the path below is not produced); codecov-action v5 hard-
        # fails when its explicit `files:` are absent even with fail_ci_if_error
        # false, which would red the whole JVM job though every test passed.
        # Coverage upload is reporting-only — keep it non-fatal until scoverage
        # report generation is restored (tracked follow-up).
        continue-on-error: true
        uses: codecov/codecov-action@v5
        with:
          files: target/scala-3.8.3/scoverage-report/scoverage.xml
          flags: ${{ matrix.platform }}
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  # ─── Browser integration tests (Scala.js + Playwright) ─────────────

  test-browser-it:
    name: Browser IT tests
    needs: [test-js]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false

      - uses: coursier/setup-action@v3.0.0
        with:
          jvm: ${{ env.JVM_VERSION }}
          apps: sbt

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Publish SGE to local Maven
        # publishM2 delivers sge core to mavenLocal (used by sge-it-browser);
        # publishLocal-js-3 delivers sge core + ALL extensions to Ivy local so
        # demos depending on extensions (e.g. tileWorld → sge-extension-noise)
        # resolve them. writeDemoVersion pins .sge-version for both.
        run: sbt 'sge/publishM2; sgeJS/publishM2; writeDemoVersion; publishLocal-jvm-3; publishLocal-js-3'

      - name: Publish sge-build plugin to Ivy local
        working-directory: sge-build
        run: sbt publishLocal

      - name: Compile regression test JS for browser bootstrap test
        run: sbt 'regressionTestJS/fastLinkJS'

      - name: Compile demo JS for browser smoke tests
        working-directory: demos
        run: sbt 'pongJS/fastLinkJS; spaceShooterJS/fastLinkJS; curvePlaygroundJS/fastLinkJS; viewportGalleryJS/fastLinkJS; shaderLabJS/fastLinkJS; tileWorldJS/fastLinkJS; hexTacticsJS/fastLinkJS; netChatJS/fastLinkJS; viewer3dJS/fastLinkJS; assetShowcaseJS/fastLinkJS; particleShowJS/fastLinkJS'

      - name: Install Playwright
        run: npx --yes playwright install --with-deps chromium

      - name: Run browser integration tests
        run: sbt 'sge-it-browser/testFull'

  # ─── Scala Native tests (uses provider JARs from Sonatype) ──────────

  test-native:
    name: Scala Native tests (${{ matrix.label }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            label: linux-x86_64
            platform: linux-x86_64
          - os: ubuntu-24.04-arm
            label: linux-aarch64
            platform: linux-aarch64
          - os: macos-latest
            label: macos-x86_64
            platform: macos-x86_64
            architecture: x64
          - os: macos-latest
            label: macos-aarch64
            platform: macos-aarch64
          - os: windows-latest
            label: windows-x86_64
            platform: windows-x86_64
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false

      - uses: actions/setup-java@v4
        with:
          distribution: ${{ env.JAVA_DISTRIBUTION }}
          java-version: ${{ env.JAVA_VERSION }}
          cache: sbt
          architecture: ${{ matrix.architecture || '' }}

      - uses: sbt/setup-sbt@v1

      - name: Install Scala Native system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y clang
          sudo apt-get install -y libstdc++-12-dev || sudo apt-get install -y libstdc++-14-dev || true

      - name: Install Scala Native system dependencies (Windows)
        if: runner.os == 'Windows'
        # zlib: the migration links Scala Native's javalib z.c (java.util.zip /
        # ZipCodec) which #include <zlib.h> and @link("z"). Linux/macOS have
        # system zlib; Windows does not. Provide it via vcpkg and expose it to
        # clang through CPATH (headers) + LIBRARY_PATH (libs); clang's `-lz`
        # resolves z.lib, so we copy vcpkg's real import lib to z.lib.
        #
        # vcpkg's exact install layout/lib name varies (zlib.lib vs
        # zlibstatic.lib, triplet subdir vs not), so DISCOVER the real lib +
        # header by recursive search under VCPKG_INSTALLATION_ROOT rather than
        # hard-coding a path. Fail loudly (and log what was found) if either is
        # missing so the next run has diagnostics.
        run: |
          $ErrorActionPreference = "Stop"
          choco install llvm --yes
          # vcpkg never materialized the import lib on this runner (manifest-mode
          # interference, repeated attempts). Build zlib deterministically from
          # source with the MSVC toolchain instead. Enter the VS dev shell so
          # nmake/cl + the Windows SDK are on PATH for THIS step's build; the sbt
          # Scala Native build sets up its own clang env, we only export
          # CPATH/LIBRARY_PATH (additive) so its clang finds zlib.h + z.lib.
          $vs = & "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe" -latest -property installationPath
          Import-Module "$vs\Common7\Tools\Microsoft.VisualStudio.DevShell.dll"
          Enter-VsDevShell -VsInstallPath $vs -DevCmdArguments "-arch=x64" -SkipAutomaticLocation
          $z = "$env:RUNNER_TEMP\zlib-src"
          git clone --depth=1 -b v1.3.1 https://github.com/madler/zlib "$z"
          Push-Location $z
          # zlib's release tree ships zconf.h; regenerate from the template if absent.
          if (-not (Test-Path "$z\zconf.h")) { Copy-Item "$z\zconf.h.in" "$z\zconf.h" -Force }
          nmake -f win32/Makefile.msc zlib.lib
          Pop-Location
          if (-not (Test-Path "$z\zlib.lib")) { throw "zlib.lib was not built under $z" }
          # clang's `-lz` resolves z.lib; the MSVC makefile emits zlib.lib (static).
          Copy-Item "$z\zlib.lib" "$z\z.lib" -Force
          Write-Host "Built zlib static lib: $z\zlib.lib ; header: $z\zlib.h"
          "CPATH=$z"        | Out-File $env:GITHUB_ENV -Append -Encoding utf8
          "LIBRARY_PATH=$z" | Out-File $env:GITHUB_ENV -Append -Encoding utf8
          # Scala Native links on Windows via clang++/link.exe, which searches the
          # MSVC `LIB` env (NOT LIBRARY_PATH) and wants `zlib.lib` (the @link("z")
          # name maps to zlib on Windows). Prepend the from-source zlib dir to LIB
          # so the linker finds zlib.lib (the LNK1104 'cannot open zlib.lib' fix).
          "LIB=$z;$env:LIB" | Out-File $env:GITHUB_ENV -Append -Encoding utf8

      - name: Run Scala Native tests
        run: sbt test-native-3

  # ─── Native FFI IT tests ────────────────────────────────────────

  test-native-ffi-it:
    name: Native FFI IT tests (${{ matrix.label }})
    needs: [test-native]
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            label: linux-x86_64
          - os: ubuntu-24.04-arm
            label: linux-aarch64
          - os: macos-latest
            label: macos-x86_64
            architecture: x64
          - os: macos-latest
            label: macos-aarch64
          - os: windows-latest
            label: windows-x86_64
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false

      - uses: actions/setup-java@v4
        with:
          distribution: ${{ env.JAVA_DISTRIBUTION }}
          java-version: ${{ env.JAVA_VERSION }}
          cache: sbt
          architecture: ${{ matrix.architecture || '' }}

      - uses: sbt/setup-sbt@v1

      - name: Install Scala Native system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y clang
          sudo apt-get install -y libstdc++-12-dev || sudo apt-get install -y libstdc++-14-dev || true

      - name: Install Scala Native system dependencies (Windows)
        if: runner.os == 'Windows'
        # zlib: the migration links Scala Native's javalib z.c (java.util.zip /
        # ZipCodec) which #include <zlib.h> and @link("z"). Linux/macOS have
        # system zlib; Windows does not. Provide it via vcpkg and expose it to
        # clang through CPATH (headers) + LIBRARY_PATH (libs); clang's `-lz`
        # resolves z.lib, so we copy vcpkg's real import lib to z.lib.
        #
        # vcpkg's exact install layout/lib name varies (zlib.lib vs
        # zlibstatic.lib, triplet subdir vs not), so DISCOVER the real lib +
        # header by recursive search under VCPKG_INSTALLATION_ROOT rather than
        # hard-coding a path. Fail loudly (and log what was found) if either is
        # missing so the next run has diagnostics.
        run: |
          $ErrorActionPreference = "Stop"
          choco install llvm --yes
          # vcpkg never materialized the import lib on this runner (manifest-mode
          # interference, repeated attempts). Build zlib deterministically from
          # source with the MSVC toolchain instead. Enter the VS dev shell so
          # nmake/cl + the Windows SDK are on PATH for THIS step's build; the sbt
          # Scala Native build sets up its own clang env, we only export
          # CPATH/LIBRARY_PATH (additive) so its clang finds zlib.h + z.lib.
          $vs = & "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe" -latest -property installationPath
          Import-Module "$vs\Common7\Tools\Microsoft.VisualStudio.DevShell.dll"
          Enter-VsDevShell -VsInstallPath $vs -DevCmdArguments "-arch=x64" -SkipAutomaticLocation
          $z = "$env:RUNNER_TEMP\zlib-src"
          git clone --depth=1 -b v1.3.1 https://github.com/madler/zlib "$z"
          Push-Location $z
          # zlib's release tree ships zconf.h; regenerate from the template if absent.
          if (-not (Test-Path "$z\zconf.h")) { Copy-Item "$z\zconf.h.in" "$z\zconf.h" -Force }
          nmake -f win32/Makefile.msc zlib.lib
          Pop-Location
          if (-not (Test-Path "$z\zlib.lib")) { throw "zlib.lib was not built under $z" }
          # clang's `-lz` resolves z.lib; the MSVC makefile emits zlib.lib (static).
          Copy-Item "$z\zlib.lib" "$z\z.lib" -Force
          Write-Host "Built zlib static lib: $z\zlib.lib ; header: $z\zlib.h"
          "CPATH=$z"        | Out-File $env:GITHUB_ENV -Append -Encoding utf8
          "LIBRARY_PATH=$z" | Out-File $env:GITHUB_ENV -Append -Encoding utf8
          # Scala Native links on Windows via clang++/link.exe, which searches the
          # MSVC `LIB` env (NOT LIBRARY_PATH) and wants `zlib.lib` (the @link("z")
          # name maps to zlib on Windows). Prepend the from-source zlib dir to LIB
          # so the linker finds zlib.lib (the LNK1104 'cannot open zlib.lib' fix).
          "LIB=$z;$env:LIB" | Out-File $env:GITHUB_ENV -Append -Encoding utf8

      - name: Run native FFI validation (headless)
        run: sbt 'sge-it-native-ffi/run -- --headless'

  # ─── Desktop IT tests (GLFW + native libs) ─────────────────────

  test-desktop-it:
    name: Desktop IT tests
    needs: [test-jvm]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false

      - uses: coursier/setup-action@v3.0.0
        with:
          jvm: ${{ env.JVM_VERSION }}
          apps: sbt

      # GLFW windowing + ANGLE GLES need a display and X11/GL runtime libs.
      # xvfb provides a virtual display. ANGLE (libEGL/libGLESv2 from the
      # provider JARs) drives a software backend: we select ANGLE's VULKAN
      # backend over mesa lavapipe (software Vulkan) instead of the default
      # GL-over-llvmpipe backend, because the GL backend does not honour
      # cross-window EGL context resource sharing under llvmpipe (the ISS-538
      # clause-2 multi-window texture-sharing check fails with the texture
      # invalid even in its own context). ANGLE/Vulkan over lavapipe implements
      # shared contexts correctly. mesa-vulkan-drivers provides lavapipe;
      # the llvmpipe GL libs remain for GLFW's own GL needs.
      - name: Install virtual display + GL/Vulkan runtime libs
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            xvfb \
            libgl1-mesa-dri \
            libegl1 \
            libgles2 \
            mesa-vulkan-drivers libvulkan1 vulkan-tools \
            libx11-6 libxext6 libxrandr2 libxinerama1 libxcursor1 libxi6 \
            libxkbcommon0 libwayland-client0

      - name: Probe software Vulkan (lavapipe)
        run: |
          echo "--- vulkan packages ---"; dpkg -l | grep -iE 'vulkan|mesa' || true
          echo "--- ICD dir ---"; ls -la /usr/share/vulkan/icd.d/ 2>&1 || true
          echo "--- lavapipe ICD json ---"; cat /usr/share/vulkan/icd.d/lvp_icd.x86_64.json 2>&1 || true
          echo "--- lavapipe lib ---"; ls -la /usr/lib/x86_64-linux-gnu/libvulkan_lvp.so* 2>&1 || true
          echo "--- vulkaninfo (loader auto-discovery) ---"
          vulkaninfo --summary 2>&1 | head -40 || true
          echo "--- vulkaninfo (pinned lavapipe ICD) ---"
          VK_ICD_FILENAMES=/usr/share/vulkan/icd.d/lvp_icd.x86_64.json vulkaninfo --summary 2>&1 | head -30 || true

      - name: Run Desktop integration tests (under xvfb)
        run: |
          xvfb-run -a --server-args="-screen 0 1280x1024x24" \
            sbt 'sge-it-desktop/testFull'
        env:
          # Hard-fail (do not assume-skip) if the display or native libs are
          # unavailable — this job must never silently return to zero executed
          # checks. See requireOrAssume in DesktopIntegrationTest (ISS-485).
          SGE_CI_REQUIRE_DISPLAY: "1"
          # Force software rendering so ANGLE/GLFW get a usable GL context with
          # no GPU present on the runner.
          LIBGL_ALWAYS_SOFTWARE: "true"
          GALLIUM_DRIVER: "llvmpipe"
          # NOTE: ANGLE_DEFAULT_PLATFORM=vulkan over lavapipe is the target for
          # ISS-538 clause 2 (cross-window sharing), but the lavapipe ICD did
          # not load on the runner (vulkaninfo: ERROR_INCOMPATIBLE_DRIVER). The
          # probe step above now dumps the real ICD layout; re-enable Vulkan
          # here once the correct VK_ICD_FILENAMES path is confirmed. Until then
          # run the default ANGLE GL backend (all checks green except clause 2).

  # ─── JVM Platform IT tests (Panama, Android ops) ───────────────

  test-jvm-platform-it:
    name: JVM Platform IT tests
    needs: [test-jvm]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false

      - uses: coursier/setup-action@v3.0.0
        with:
          jvm: ${{ env.JVM_VERSION }}
          apps: sbt

      - name: Run JVM Platform integration tests
        run: sbt 'sge-it-jvm-platform/testFull'

  # ─── Android IT tests (emulator) ──────────────────────────────

  test-android:
    name: Android tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false

      - uses: coursier/setup-action@v3.0.0
        with:
          jvm: ${{ env.JVM_VERSION }}
          apps: sbt

      - name: Publish SGE to local Maven (all platforms)
        run: sbt 'sge/publishM2; writeDemoVersion'

      - name: Publish sge-build plugin to Ivy local
        working-directory: sge-build
        run: sbt publishLocal

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Android smoke tests
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 35
          target: google_apis
          arch: x86_64
          force-avd-creation: false
          emulator-options: -no-window -gpu swiftshader_indirect -no-snapshot -noaudio -no-boot-anim -no-metrics
          disable-animations: true
          script: sbt 'sge-android-smoke/testFull'

  # ─── Android IT tests (emulator, depends on unit tests) ────────

  test-android-it:
    name: Android IT tests
    needs: [test-android]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false

      - uses: coursier/setup-action@v3.0.0
        with:
          jvm: ${{ env.JVM_VERSION }}
          apps: sbt

      - name: Publish SGE to local Maven (all platforms)
        run: sbt 'sge/publishM2; writeDemoVersion'

      - name: Publish sge-build plugin to Ivy local
        working-directory: sge-build
        run: sbt publishLocal

      - name: Build smoke APK
        run: sbt 'sge-android-smoke/androidSign'

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Android integration tests
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 35
          target: google_apis
          arch: x86_64
          force-avd-creation: false
          emulator-options: -no-window -gpu swiftshader_indirect -no-snapshot -noaudio -no-boot-anim -no-metrics
          disable-animations: true
          # Build the smoke APK INSIDE the emulator-runner environment right before
          # the IT (the separate "Build smoke APK" step runs in a context the test
          # could not see the artifact from). Diagnostics: print the cwd and every
          # .apk produced so the next run reveals the real output path if the test
          # still cannot locate it.
          script: |
            echo "ANDROID-IT cwd=$(pwd) HOME=$HOME"
            sbt 'sge-android-smoke/androidSign'
            echo "=== .apk files produced ==="; find "$(pwd)" -name '*.apk' 2>/dev/null; find "$HOME" -name 'app-debug.apk' 2>/dev/null | head
            sbt 'sge-it-android/testFull'

  # ─── Demo smoke (Scala.js) ──────────────────────────────────────

  demo-smoke-js:
    name: Demo smoke (JS)
    needs: [test-js]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false

      - uses: coursier/setup-action@v3.0.0
        with:
          jvm: ${{ env.JVM_VERSION }}
          apps: sbt

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Publish SGE JS to local Maven
        # publishLocal-js-3 covers sge core + ALL JS extensions to Ivy local
        # (demos resolve from Ivy local + mavenLocal). publishM2 keeps sge core
        # in mavenLocal for any consumer that resolves there.
        run: sbt 'sge/publishM2; sgeJS/publishM2; writeDemoVersion; publishLocal-js-3'

      - name: Publish sge-build plugin to Ivy local
        working-directory: sge-build
        run: sbt publishLocal

      - name: Compile Pong JS demo
        working-directory: demos
        run: sbt 'pongJS/fastLinkJS'

  # ─── Demo compile all (JVM + JS + Native) ──────────────────────

  demo-compile-all:
    name: Demo compile all
    needs: [test-js]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false

      - uses: coursier/setup-action@v3.0.0
        with:
          jvm: ${{ env.JVM_VERSION }}
          apps: sbt

      - name: Install Scala Native system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang
          sudo apt-get install -y libstdc++-12-dev || sudo apt-get install -y libstdc++-14-dev || true

      - name: Publish SGE to local Maven (all platforms)
        # demos compile on JVM + JS + Native and several depend on extensions
        # (e.g. tileWorld → sge-extension-noise). The publishLocal-{jvm,js,native}-3
        # aliases deliver sge core + ALL extensions per platform to Ivy local;
        # publishM2 keeps sge core in mavenLocal. writeDemoVersion pins the version.
        run: sbt 'sge/publishM2; sgeJS/publishM2; sgeNative/publishM2; writeDemoVersion; publishLocal-jvm-3; publishLocal-js-3; publishLocal-native-3'

      - name: Publish sge-build plugin to Ivy local
        working-directory: sge-build
        run: sbt publishLocal

      - name: Compile all demos (JVM + JS + Native)
        working-directory: demos
        run: sbt compile

      - name: Verify all demos link for Scala Native
        working-directory: demos
        run: |
          sbt 'pongNative/nativeLink; spaceShooterNative/nativeLink; curvePlaygroundNative/nativeLink; viewportGalleryNative/nativeLink; shaderLabNative/nativeLink; tileWorldNative/nativeLink; hexTacticsNative/nativeLink; viewer3dNative/nativeLink; particleShowNative/nativeLink; netChatNative/nativeLink; assetShowcaseNative/nativeLink'

  # ─── Verify release packaging ──────────────────────────────────

  verify-release:
    name: Verify release (${{ matrix.label }})
    needs: [test-jvm, test-native]
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            label: linux-x86_64
            platform: linux-x86_64
            native: true
          - os: ubuntu-24.04-arm
            label: linux-aarch64
            platform: linux-aarch64
            native: true
          - os: macos-latest
            label: macos-aarch64
            platform: macos-aarch64
            native: true
          - os: macos-latest
            label: macos-x86_64
            platform: macos-x86_64
            native: true
            architecture: x64
          - os: windows-latest
            label: windows-x86_64
            platform: windows-x86_64
            native: false
          - os: windows-11-arm
            label: windows-aarch64
            platform: windows-aarch64
            native: false
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false

      - uses: actions/setup-java@v4
        with:
          distribution: ${{ env.JAVA_DISTRIBUTION }}
          java-version: ${{ env.JAVA_VERSION }}
          cache: sbt
          architecture: ${{ matrix.architecture || '' }}

      - uses: sbt/setup-sbt@v1

      - name: Install Scala Native system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y clang
          sudo apt-get install -y libstdc++-12-dev || sudo apt-get install -y libstdc++-14-dev || true

      - name: Publish SGE to local Maven (all platforms)
        run: sbt 'sge/publishM2; sgeJS/publishM2; sgeNative/publishM2; writeDemoVersion'

      - name: Publish sge-build plugin to Ivy local
        working-directory: sge-build
        run: sbt publishLocal

      - name: Build Pong JVM release
        working-directory: demos
        run: sbt 'pong/releasePackage'

      - name: Build Pong Native release
        if: matrix.native
        working-directory: demos
        run: sbt 'pongNative/nativeLink'
