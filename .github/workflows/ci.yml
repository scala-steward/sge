name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

# Cancel in-progress runs for the same branch/PR
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─── Native Components (Rust library) ──────────────────────────────
  # Cross-compile all 6 desktop targets using 2 runners:
  #   - macOS:  macos-x86_64, macos-aarch64 (native cross-arch)
  #   - Linux:  linux-x86_64, linux-aarch64 (zigbuild), windows-x86_64, windows-aarch64 (xwin)
  # Each runner also runs Rust tests for the host platform.

  build-native-macos:
    name: Native Components (macOS x86_64 + aarch64)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-apple-darwin,aarch64-apple-darwin

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            native-components/target
          key: rust-macos-cross-${{ hashFiles('native-components/Cargo.lock') }}
          restore-keys: rust-macos-cross-

      - name: Run Rust tests (host)
        working-directory: native-components
        run: cargo test

      - name: Build macos-aarch64
        working-directory: native-components
        run: cargo build --release --target aarch64-apple-darwin

      - name: Build macos-x86_64
        working-directory: native-components
        run: cargo build --release --target x86_64-apple-darwin

      - name: Upload macos-aarch64
        uses: actions/upload-artifact@v4
        with:
          name: rust-lib-macos-aarch64
          retention-days: 1
          path: |
            native-components/target/aarch64-apple-darwin/release/libsge_native_ops.dylib
            native-components/target/aarch64-apple-darwin/release/libsge_native_ops.a

      - name: Upload macos-x86_64
        uses: actions/upload-artifact@v4
        with:
          name: rust-lib-macos-x86_64
          retention-days: 1
          path: |
            native-components/target/x86_64-apple-darwin/release/libsge_native_ops.dylib
            native-components/target/x86_64-apple-darwin/release/libsge_native_ops.a

  build-native-linux-windows:
    name: Native Components (Linux + Windows, x86_64 + aarch64)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu,aarch64-unknown-linux-gnu,x86_64-pc-windows-msvc,aarch64-pc-windows-msvc

      - uses: mlugg/setup-zig@v2

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            ~/.cargo/bin
            native-components/target
          key: rust-linux-cross-${{ hashFiles('native-components/Cargo.lock') }}
          restore-keys: rust-linux-cross-

      - name: Install cross-compilation tools
        run: |
          cargo install cargo-zigbuild --locked 2>/dev/null || true
          cargo install cargo-xwin --locked 2>/dev/null || true

      - name: Run Rust tests (host)
        working-directory: native-components
        run: cargo test

      - name: Build linux-x86_64
        working-directory: native-components
        run: cargo zigbuild --release --target x86_64-unknown-linux-gnu

      - name: Build linux-aarch64
        working-directory: native-components
        run: cargo zigbuild --release --target aarch64-unknown-linux-gnu

      - name: Build windows-x86_64
        working-directory: native-components
        run: cargo xwin build --release --target x86_64-pc-windows-msvc

      - name: Build windows-aarch64
        working-directory: native-components
        run: cargo xwin build --release --target aarch64-pc-windows-msvc

      - name: Upload linux-x86_64
        uses: actions/upload-artifact@v4
        with:
          name: rust-lib-linux-x86_64
          retention-days: 1
          path: |
            native-components/target/x86_64-unknown-linux-gnu/release/libsge_native_ops.so
            native-components/target/x86_64-unknown-linux-gnu/release/libsge_native_ops.a

      - name: Upload linux-aarch64
        uses: actions/upload-artifact@v4
        with:
          name: rust-lib-linux-aarch64
          retention-days: 1
          path: |
            native-components/target/aarch64-unknown-linux-gnu/release/libsge_native_ops.so
            native-components/target/aarch64-unknown-linux-gnu/release/libsge_native_ops.a

      - name: Upload windows-x86_64
        uses: actions/upload-artifact@v4
        with:
          name: rust-lib-windows-x86_64
          retention-days: 1
          path: |
            native-components/target/x86_64-pc-windows-msvc/release/sge_native_ops.dll
            native-components/target/x86_64-pc-windows-msvc/release/sge_native_ops.dll.lib
            native-components/target/x86_64-pc-windows-msvc/release/sge_native_ops.lib

      - name: Upload windows-aarch64
        uses: actions/upload-artifact@v4
        with:
          name: rust-lib-windows-aarch64
          retention-days: 1
          path: |
            native-components/target/aarch64-pc-windows-msvc/release/sge_native_ops.dll
            native-components/target/aarch64-pc-windows-msvc/release/sge_native_ops.dll.lib
            native-components/target/aarch64-pc-windows-msvc/release/sge_native_ops.lib

  # ─── Scala.js compile + test (pure Scala, no native dependencies) ───

  test-js:
    name: Scala.js compile + test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: sbt

      - uses: sbt/setup-sbt@v1

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Compile + test Scala.js
        run: sbt 'sgeJS/test'

  # ─── JVM compile + test (requires Rust library) ────────────────────

  test-jvm:
    name: JVM tests (${{ matrix.label }})
    needs: [build-native-macos, build-native-linux-windows]
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            label: linux-x86_64
            artifact: rust-lib-linux-x86_64
          - os: macos-13
            label: macos-x86_64
            artifact: rust-lib-macos-x86_64
          - os: macos-latest
            label: macos-aarch64
            artifact: rust-lib-macos-aarch64
          - os: windows-latest
            label: windows-x86_64
            artifact: rust-lib-windows-x86_64
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: sbt

      - uses: sbt/setup-sbt@v1

      - name: Download Rust artifacts
        uses: actions/download-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: native-components/target/release

      - name: Run JVM tests
        run: sbt 'sge/test'

      - name: JVM Platform IT tests
        run: sbt 'sge-it-jvm-platform/test'

  # ─── Browser integration tests (Scala.js + Playwright) ─────────────

  test-browser-it:
    name: Browser integration tests
    needs: [test-js]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: sbt

      - uses: sbt/setup-sbt@v1

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install Playwright Chromium
        run: npx playwright@1.49.0 install chromium

      - name: Compile Scala.js demo
        run: sbt 'demoJS/fastLinkJS'

      - name: Run browser integration tests (bootstrap only)
        run: sbt 'sge-it-browser/testOnly sge.browser.BrowserBootstrapTest'

  # ─── Scala Native compile + test (requires Rust static library) ────

  test-native:
    name: Scala Native tests (${{ matrix.label }})
    needs: [build-native-macos, build-native-linux-windows]
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            label: linux-x86_64
            artifact: rust-lib-linux-x86_64
          - os: macos-13
            label: macos-x86_64
            artifact: rust-lib-macos-x86_64
          - os: macos-latest
            label: macos-aarch64
            artifact: rust-lib-macos-aarch64
          - os: windows-latest
            label: windows-x86_64
            artifact: rust-lib-windows-x86_64
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: sbt

      - uses: sbt/setup-sbt@v1

      - name: Install Scala Native system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y clang libstdc++-12-dev libidn2-dev libcurl4-openssl-dev

      - name: Install Scala Native system dependencies (Windows)
        if: runner.os == 'Windows'
        run: choco install llvm --yes

      - name: Download Rust artifacts
        uses: actions/download-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: native-components/target/release

      - name: Remove dynamic libraries (force static linking)
        shell: bash
        run: rm -f native-components/target/release/libsge_native_ops.{dylib,so} native-components/target/release/sge_native_ops.dll

      # sttp's curl backend declares @link("idn2") in its Scala Native IR, but
      # Windows curl uses WinAPI for IDN — libidn2 is never actually called.
      # Create an empty stub so the MSVC linker is satisfied.
      - name: Create empty idn2 stub library (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          echo "void __idn2_stub(void) {}" > native-components/target/release/idn2_stub.c
          clang -c native-components/target/release/idn2_stub.c -o native-components/target/release/idn2_stub.obj
          llvm-lib /OUT:native-components/target/release/idn2.lib native-components/target/release/idn2_stub.obj

      - name: Run Scala Native tests
        run: sbt 'sgeNative/test'

  # ─── Android smoke + integration tests (emulator) ──────────────
  # Builds the smoke APK and runs it on a headless Android emulator
  # with SwiftShader (CPU-based GL ES). Verifies all 6 subsystem
  # checks pass: bootstrap, GL2D, GL3D, file I/O, JSON/XML, audio.

  test-android:
    name: Android smoke + integration tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: sbt

      - uses: sbt/setup-sbt@v1

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          cmdline-tools-version: latest

      - name: Install Android SDK components
        run: |
          sdkmanager "platforms;android-35" "build-tools;35.0.0"

      - name: Build smoke APK
        run: sbt 'sge-android-smoke/androidSign'

      - name: Run Android integration tests
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 35
          target: google_apis
          arch: x86_64
          force-avd-creation: true
          avd-name: sge-test-avd
          emulator-options: -no-snapshot -noaudio -no-boot-anim -gpu swiftshader_indirect
          script: sbt 'sge-it-android/test'

  # ─── Demo smoke tests (Scala.js demos in headless Chromium) ────────
  # Builds individual demo JS bundles from the demos/ sub-build and
  # verifies they start up without errors using Playwright.

  demo-smoke-js:
    name: Demo JS smoke tests (Playwright)
    needs: [test-js]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: sbt

      - uses: sbt/setup-sbt@v1

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install Playwright Chromium
        run: npx playwright@1.49.0 install chromium

      - name: Publish SGE to local Ivy (JVM + JS)
        run: sbt 'sge/publishLocal' 'sgeJS/publishLocal'

      - name: Build demo JS bundles
        working-directory: demos
        run: |
          sbt 'pongJS/fastLinkJS' \
              'spaceShooterJS/fastLinkJS' \
              'curvePlaygroundJS/fastLinkJS' \
              'viewportGalleryJS/fastLinkJS' \
              'shaderLabJS/fastLinkJS' \
              'tileWorldJS/fastLinkJS' \
              'hexTacticsJS/fastLinkJS' \
              'viewer3dJS/fastLinkJS' \
              'particleShowJS/fastLinkJS' \
              'netChatJS/fastLinkJS'

      - name: Run demo smoke tests
        run: sbt 'sge-it-browser/testOnly sge.browser.DemoSmokeTest'

  # ─── Demo compile-all gate (all 10 demos × 3 platforms) ────────────
  # Compiles all demos on JVM, JS, and Native to catch API regressions.
  # Does not link Native (avoids needing Rust lib + ANGLE).

  demo-compile-all:
    name: Compile all demos (JVM + JS + Native)
    needs: [test-js]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: sbt

      - uses: sbt/setup-sbt@v1

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install Scala Native system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang libstdc++-12-dev

      - name: Publish SGE to local Ivy (all platforms)
        run: sbt 'sge/publishLocal' 'sgeJS/publishLocal' 'sgeNative/publishLocal'

      - name: Compile all demos (JVM)
        working-directory: demos
        run: sbt compile

      - name: Compile all demos (JS)
        working-directory: demos
        run: |
          sbt 'sharedJS/compile' \
              'pongJS/compile' \
              'spaceShooterJS/compile' \
              'tileWorldJS/compile' \
              'hexTacticsJS/compile' \
              'curvePlaygroundJS/compile' \
              'shaderLabJS/compile' \
              'viewer3dJS/compile' \
              'particleShowJS/compile' \
              'netChatJS/compile' \
              'viewportGalleryJS/compile'

      - name: Compile all demos (Native)
        working-directory: demos
        run: |
          sbt 'sharedNative/compile' \
              'pongNative/compile' \
              'spaceShooterNative/compile' \
              'tileWorldNative/compile' \
              'hexTacticsNative/compile' \
              'curvePlaygroundNative/compile' \
              'shaderLabNative/compile' \
              'viewer3dNative/compile' \
              'particleShowNative/compile' \
              'netChatNative/compile' \
              'viewportGalleryNative/compile'
