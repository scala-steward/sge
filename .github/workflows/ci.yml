name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

# Cancel in-progress runs for the same branch/PR
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  # Zulu 25 — Panama FFM stable since JDK 22, all 6 desktop platforms
  # including Windows aarch64 (which Temurin 25 lacks).
  # Same JDK used for release packaging (see demos/build.sbt jdkUrls).
  JAVA_VERSION: "25"
  JAVA_DISTRIBUTION: "zulu"
  NODE_VERSION: "22"
  # Demos read .sge-version file written by publishLocal + writeDemoVersion.

jobs:
  # ─── Native Components (Rust library) ──────────────────────────────
  # Single macOS runner builds ALL 9 targets — exactly like local dev.
  # All artifacts are COMPLETE — includes libsge_native_ops, libsge_audio,
  # libglfw, and FreeType. Ready for release packaging.

  build-native:
    name: Native Components (all 9 targets)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: >-
            x86_64-apple-darwin,
            aarch64-apple-darwin,
            x86_64-unknown-linux-gnu,
            aarch64-unknown-linux-gnu,
            x86_64-pc-windows-msvc,
            aarch64-pc-windows-msvc,
            aarch64-linux-android,
            armv7-linux-androideabi,
            x86_64-linux-android

      - uses: mlugg/setup-zig@v2
      - uses: VirtusLab/scala-cli-setup@v1

      - name: Cache scala-cli
        uses: actions/cache@v4
        with:
          path: |
            ~/Library/Caches/ScalaCli
            ~/.cache/scala-cli
            ~/.cache/scalafmt
          key: scala-cli-native-${{ hashFiles('scripts/src/Main.scala') }}
          restore-keys: scala-cli-native-

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            ~/.cargo/bin
            ~/Library/Caches/cargo-xwin
            ~/Library/Caches/cargo-zigbuild
            sge-deps/native-components/target
          key: rust-macos-all-${{ hashFiles('sge-deps/native-components/Cargo.lock') }}
          restore-keys: rust-macos-all-

      - name: Set up Android NDK
        run: |
          brew install --cask android-commandlinetools
          export ANDROID_HOME="$HOME/Library/Android/sdk"
          echo "ANDROID_HOME=$ANDROID_HOME" >> $GITHUB_ENV
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "ndk;27.2.12479018" || true

      - name: Compile sge-dev
        run: |
          scala-cli --power package --native scripts/src/ -o sge-dev -f --suppress-outdated-dependency-warning
          echo "$PWD" >> $GITHUB_PATH

      - name: Run sge-dev setup
        run: sge-dev setup --ci

      - name: Add LLVM to PATH
        run: echo "/opt/homebrew/opt/llvm/bin" >> $GITHUB_PATH

      - name: Run Rust tests (host)
        run: sge-dev native test

      - name: Build all 6 desktop targets
        run: sge-dev native cross-all

      - name: Build all 3 Android targets
        run: sge-dev native cross-android
        env:
          ANDROID_NDK_HOME: ${{ env.ANDROID_HOME }}/ndk/27.2.12479018

      - name: Verify artifacts
        run: |
          echo "=== Desktop ==="
          MISSING=0
          for plat in macos-aarch64 macos-x86_64 linux-x86_64 linux-aarch64 windows-x86_64 windows-aarch64; do
            echo "--- $plat ---"
            ls sge-deps/native-components/target/cross/$plat/ 2>/dev/null || echo "  MISSING!"
            # Verify critical static archives exist for Scala Native platforms
            if [[ "$plat" != windows-* ]]; then
              for lib in libsge_native_ops.a libsge_audio.a libglfw3.a; do
                if [ ! -f "sge-deps/native-components/target/cross/$plat/$lib" ]; then
                  echo "  MISSING: $lib"
                  MISSING=1
                fi
              done
            fi
          done
          echo "=== Android ==="
          for target in aarch64-linux-android armv7-linux-androideabi x86_64-linux-android; do
            echo "--- $target ---"
            ls sge-deps/native-components/target/$target/release/lib*.so 2>/dev/null || echo "  MISSING!"
          done
          if [ "$MISSING" -eq 1 ]; then
            echo "::error::Critical native artifacts are missing!"
            exit 1
          fi

      - name: Upload desktop artifacts
        uses: actions/upload-artifact@v4
        with:
          name: native-desktop
          retention-days: 1
          path: sge-deps/native-components/target/cross/

      - name: Upload Android artifacts
        uses: actions/upload-artifact@v4
        with:
          name: native-android
          retention-days: 1
          path: |
            sge-deps/native-components/target/aarch64-linux-android/release/libsge_native_ops.so
            sge-deps/native-components/target/aarch64-linux-android/release/libsge_audio.so
            sge-deps/native-components/target/armv7-linux-androideabi/release/libsge_native_ops.so
            sge-deps/native-components/target/armv7-linux-androideabi/release/libsge_audio.so
            sge-deps/native-components/target/x86_64-linux-android/release/libsge_native_ops.so
            sge-deps/native-components/target/x86_64-linux-android/release/libsge_audio.so

  # ─── Scala.js compile + test (pure Scala, no native dependencies) ───

  test-js:
    name: Scala.js compile + test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: ${{ env.JAVA_DISTRIBUTION }}
          java-version: ${{ env.JAVA_VERSION }}
          cache: sbt

      - uses: sbt/setup-sbt@v1

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Run Scala.js tests
        run: sbt 'sgeJS/test'

  # ─── JVM compile + test (requires Rust library) ────────────────────

  test-jvm:
    name: JVM tests (${{ matrix.label }})
    needs: [build-native]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            label: linux-x86_64
            platform: linux-x86_64
          - os: macos-latest
            label: macos-aarch64
            platform: macos-aarch64
          - os: windows-latest
            label: windows-x86_64
            platform: windows-x86_64
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - uses: actions/setup-java@v4
        with:
          distribution: ${{ env.JAVA_DISTRIBUTION }}
          java-version: ${{ env.JAVA_VERSION }}
          cache: sbt

      - uses: sbt/setup-sbt@v1

      - name: Download native artifacts
        uses: actions/download-artifact@v4
        with:
          name: native-desktop
          path: sge-deps/native-components/target/cross

      - name: Copy platform libs to release dir
        shell: bash
        run: |
          mkdir -p sge-deps/native-components/target/release
          cp sge-deps/native-components/target/cross/${{ matrix.platform }}/* sge-deps/native-components/target/release/

      - name: Run JVM tests
        run: sbt 'sge/test'

  # ─── Browser integration tests (Scala.js + Playwright) ─────────────

  test-browser-it:
    name: Browser integration tests
    needs: [test-js]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: ${{ env.JAVA_DISTRIBUTION }}
          java-version: ${{ env.JAVA_VERSION }}
          cache: sbt

      - uses: sbt/setup-sbt@v1

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install Playwright Chromium
        run: npx playwright@1.49.0 install chromium

      - name: Compile JS regression test + run browser IT
        run: |
          sbt --client 'regressionTestJS/fastLinkJS'
          sbt --client 'sge-it-browser/testOnly sge.browser.BrowserBootstrapTest'

  # ─── Scala Native compile + test (requires Rust static library) ────

  test-native:
    name: Scala Native tests (${{ matrix.label }})
    needs: [build-native]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            label: linux-x86_64
            platform: linux-x86_64
          - os: macos-latest
            label: macos-aarch64
            platform: macos-aarch64
          - os: windows-latest
            label: windows-x86_64
            platform: windows-x86_64
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - uses: actions/setup-java@v4
        with:
          distribution: ${{ env.JAVA_DISTRIBUTION }}
          java-version: ${{ env.JAVA_VERSION }}
          cache: sbt

      - uses: sbt/setup-sbt@v1

      - name: Install Scala Native system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y clang libstdc++-12-dev libfreetype-dev libunistring-dev

      - name: Install Scala Native system dependencies (Windows)
        if: runner.os == 'Windows'
        run: choco install llvm --yes

      - name: Download native artifacts
        uses: actions/download-artifact@v4
        with:
          name: native-desktop
          path: sge-deps/native-components/target/cross

      - name: Copy platform libs to release dir
        shell: bash
        run: |
          mkdir -p sge-deps/native-components/target/release
          cp sge-deps/native-components/target/cross/${{ matrix.platform }}/* sge-deps/native-components/target/release/

      - name: Remove dynamic libraries (force static linking)
        shell: bash
        run: |
          rm -f sge-deps/native-components/target/release/libsge_native_ops.{dylib,so}
          rm -f sge-deps/native-components/target/release/libsge_audio.{dylib,so}
          rm -f sge-deps/native-components/target/release/libglfw.{dylib,so}
          rm -f sge-deps/native-components/target/release/sge_native_ops.dll
          rm -f sge-deps/native-components/target/release/sge_audio.dll
          rm -f sge-deps/native-components/target/release/glfw3.dll

      - name: Create Windows stub libraries
        if: runner.os == 'Windows'
        shell: bash
        run: |
          DEST="sge-deps/native-components/target/release"
          SRC="$DEST/sge_native_ops.dll.lib"
          if [ -f "$SRC" ]; then
            # Stub .lib for libs merged into sge_native_ops.dll
            for lib in sge_audio freetype glfw glfw3 EGL GLESv2; do
              cp "$SRC" "$DEST/${lib}.lib"
            done
            # For idn2/curl: create a C stub with no-op implementations,
            # compile to .lib so @link annotations resolve without MinGW deps.
            printf '#include <stdlib.h>\n#include <string.h>\nint idn2_to_ascii_8z(const char *i, char **o, int f) { if(o) *o=_strdup(i?i:""); return 0; }\nconst char *idn2_strerror(int r) { return "stub"; }\nvoid idn2_free(void *p) { free(p); }\nint idn2_lookup_u8(const void *s, void *d, int f) { return 0; }\n' > /tmp/idn2_stub.c
            clang -c /tmp/idn2_stub.c -o /tmp/idn2_stub.obj
            llvm-lib /tmp/idn2_stub.obj /out:"$DEST/idn2.lib"
            cp "$DEST/idn2.lib" "$DEST/curl.lib"
            echo "Created stub .lib files"
          else
            echo "WARNING: sge_native_ops.dll.lib not found!"
          fi

      - name: Verify static libraries
        shell: bash
        run: |
          echo "=== Static libraries in release dir ==="
          ls -la sge-deps/native-components/target/release/*.a 2>/dev/null || echo "No .a files found!"
          ls -la sge-deps/native-components/target/release/*.lib 2>/dev/null || true

      - name: Download static curl libraries
        if: runner.os != 'Windows'
        shell: bash
        run: |
          PLATFORM="${{ matrix.platform }}"
          CURL_PLATFORM="${PLATFORM/macos-aarch64/macos-arm64}"
          CURL_VERSION="8.19.0"
          CURL_URL="https://github.com/stunnel/static-curl/releases/download/${CURL_VERSION}/curl-${CURL_PLATFORM}-dev-${CURL_VERSION}.tar.xz"
          DEST="sge-deps/native-components/target/release"
          mkdir -p "$DEST"
          ARCHIVE="/tmp/curl-${CURL_PLATFORM}.tar.xz"
          curl -fSL -o "$ARCHIVE" "$CURL_URL"
          TMP_DIR="/tmp/curl-extract-$$"
          mkdir -p "$TMP_DIR"
          tar xf "$ARCHIVE" -C "$TMP_DIR"
          find "$TMP_DIR" -path '*/lib/*.a' -exec cp {} "$DEST/" \;
          rm -rf "$TMP_DIR" "$ARCHIVE"

      - name: Run Scala Native tests
        run: sbt 'sgeNative/test'

  # ─── Android smoke + integration tests (emulator) ──────────────

  test-android:
    name: Android smoke + integration tests
    needs: [build-native]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - uses: actions/setup-java@v4
        with:
          distribution: ${{ env.JAVA_DISTRIBUTION }}
          java-version: ${{ env.JAVA_VERSION }}
          cache: sbt

      - uses: sbt/setup-sbt@v1

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm
          echo "=== KVM status ==="
          ls -la /dev/kvm 2>/dev/null && echo "KVM: available" || echo "KVM: NOT available"
          egrep -c '(vmx|svm)' /proc/cpuinfo && echo "CPU virtualization: supported" || echo "CPU virtualization: NOT supported"

      - name: Install emulator dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libpulse0

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          cmdline-tools-version: latest

      - name: Install Android SDK components
        run: |
          sdkmanager "platforms;android-36" "build-tools;36.0.0" "system-images;android-36;google_apis;x86_64"

      - name: Download Android native artifacts
        uses: actions/download-artifact@v4
        with:
          name: native-android
          path: sge-deps/native-components/target/

      - name: Build smoke APK
        run: sbt 'sge-android-smoke/androidSign'

      - name: Run Android integration tests
        uses: reactivecircus/android-emulator-runner@v2
        env:
          QT_QPA_PLATFORM: offscreen
        with:
          api-level: 36
          target: google_apis
          arch: x86_64
          force-avd-creation: true
          avd-name: sge-test-avd
          emulator-boot-timeout: 300
          emulator-options: -no-window -gpu swiftshader_indirect -no-snapshot -noaudio -no-boot-anim -no-metrics
          pre-emulator-launch-script: |
            echo "=== Pre-launch diagnostics ==="
            echo "KVM:" && ls -la /dev/kvm
            echo "Emulator version:" && $ANDROID_HOME/emulator/emulator -version
          script: |
            echo "=== Emulator booted ==="
            adb devices -l
            sbt 'sge-it-android/test'

  # ─── Demo smoke tests (Scala.js demos in headless Chromium) ────────

  demo-smoke-js:
    name: Demo JS smoke tests (Playwright)
    needs: [test-js]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: ${{ env.JAVA_DISTRIBUTION }}
          java-version: ${{ env.JAVA_VERSION }}
          cache: sbt

      - uses: sbt/setup-sbt@v1

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install Playwright Chromium
        run: npx playwright@1.49.0 install chromium

      - name: Publish SGE to local Maven (JVM + JS)
        run: sbt 'sge/publishM2; sgeJS/publishM2; writeDemoVersion'
        env:
          SGE_SKIP_NATIVE_VALIDATION: "true"

      - name: Verify .sge-version
        run: |
          echo "=== .sge-version ==="
          cat demos/.sge-version
          echo ""
          echo "=== Published to M2 ==="
          VERSION=$(cat demos/.sge-version)
          ls ~/.m2/repository/com/kubuszok/sge_3/$VERSION/ 2>/dev/null || echo "JVM: NOT FOUND"
          ls ~/.m2/repository/com/kubuszok/sge_sjs1_3/$VERSION/ 2>/dev/null || echo "JS: NOT FOUND"

      - name: Build demo JS bundles
        working-directory: demos
        run: sbt --client 'pongJS/fastLinkJS; spaceShooterJS/fastLinkJS; curvePlaygroundJS/fastLinkJS; viewportGalleryJS/fastLinkJS; shaderLabJS/fastLinkJS; tileWorldJS/fastLinkJS; hexTacticsJS/fastLinkJS; viewer3dJS/fastLinkJS; particleShowJS/fastLinkJS; assetShowcaseJS/fastLinkJS'

      - name: Run demo smoke tests
        run: sbt --client 'sge-it-browser/testOnly sge.browser.DemoSmokeTest'

  # ─── Demo compile-all gate (all 10 demos × 3 platforms) ────────────

  demo-compile-all:
    name: Compile all demos (JVM + JS + Native)
    needs: [test-js]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: ${{ env.JAVA_DISTRIBUTION }}
          java-version: ${{ env.JAVA_VERSION }}
          cache: sbt

      - uses: sbt/setup-sbt@v1

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install Scala Native system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang libstdc++-12-dev

      - name: Publish SGE to local Maven (all platforms)
        run: sbt 'sge/publishM2; sgeJS/publishM2; sgeNative/publishM2; writeDemoVersion'
        env:
          SGE_SKIP_NATIVE_VALIDATION: "true"

      - name: Verify .sge-version
        run: |
          echo "=== .sge-version ==="
          cat demos/.sge-version
          echo ""
          echo "=== Published to M2 ==="
          VERSION=$(cat demos/.sge-version)
          ls ~/.m2/repository/com/kubuszok/sge_3/$VERSION/ 2>/dev/null || echo "JVM: NOT FOUND"
          ls ~/.m2/repository/com/kubuszok/sge_sjs1_3/$VERSION/ 2>/dev/null || echo "JS: NOT FOUND"
          ls ~/.m2/repository/com/kubuszok/sge_native0.5_3/$VERSION/ 2>/dev/null || echo "Native: NOT FOUND"

      - name: Compile all demos (JVM)
        working-directory: demos
        run: sbt --client compile

      - name: Compile all demos (JS)
        working-directory: demos
        run: sbt --client 'sharedJS/compile; pongJS/compile; spaceShooterJS/compile; tileWorldJS/compile; hexTacticsJS/compile; curvePlaygroundJS/compile; shaderLabJS/compile; viewer3dJS/compile; particleShowJS/compile; viewportGalleryJS/compile; assetShowcaseJS/compile'

      - name: Compile all demos (Native)
        working-directory: demos
        run: sbt --client 'sharedNative/compile; pongNative/compile; spaceShooterNative/compile; tileWorldNative/compile; hexTacticsNative/compile; curvePlaygroundNative/compile; shaderLabNative/compile; viewer3dNative/compile; particleShowNative/compile; viewportGalleryNative/compile; assetShowcaseNative/compile'
