name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

# Cancel in-progress runs for the same branch/PR
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  # Zulu 25 — Panama FFM stable since JDK 22, all 6 desktop platforms
  # including Windows aarch64 (which Temurin 25 lacks).
  # Same JDK used for release packaging (see demos/build.sbt jdkUrls).
  JAVA_VERSION: "25"
  JAVA_DISTRIBUTION: "zulu"
  NODE_VERSION: "22"
  # Native component provider versions (from sge-native-components + sbt-multi-arch-release repos)
  NATIVE_COMPONENTS_VERSION: "cfa340140de841e1fe29c87edd9277a0766a8eed-SNAPSHOT"
  SONATYPE_SNAPSHOTS: "https://central.sonatype.com/repository/maven-snapshots"

jobs:
  # ─── re-scale enforce gate (covenant verify + shortcut budget) ──────
  #
  # Non-blocking initially: validates that every file with a `Covenant: full-port`
  # header still passes (no method dropped, no shortcut introduced) and that no
  # new shortcut markers leaked into covenanted files. Once the steady state holds
  # for ~1 week, drop `continue-on-error` to make this a hard gate.

  enforce:
    name: re-scale enforce
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false

      - uses: actions/setup-java@v4
        with:
          distribution: ${{ env.JAVA_DISTRIBUTION }}
          java-version: ${{ env.JAVA_VERSION }}

      - uses: sbt/setup-sbt@v1

      - name: Install Scala Native deps
        run: |
          sudo apt-get update
          sudo apt-get install -y clang

      - name: Install re-scale
        run: |
          set -euo pipefail
          git clone --depth=1 https://github.com/kubuszok/re-scale.git "$RUNNER_TEMP/re-scale"
          cd "$RUNNER_TEMP/re-scale"
          sbt install
          echo "$RUNNER_TEMP/re-scale/bin" >> "$GITHUB_PATH"

      - name: Print re-scale version
        run: re-scale version

      - name: Verify covenants on covenanted files
        run: re-scale enforce verify --all

      - name: Shortcut budget on covenanted files
        run: re-scale enforce shortcuts --covenanted

  # ─── Scala.js compile + test (pure Scala, no native dependencies) ───

  test-js:
    name: Scala.js tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: ${{ env.JAVA_DISTRIBUTION }}
          java-version: ${{ env.JAVA_VERSION }}
          cache: sbt

      - uses: sbt/setup-sbt@v1

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Run Scala.js tests
        run: sbt 'sgeJS/test'

      - name: Test scaladoc generation (non-blocking)
        continue-on-error: true
        run: sbt 'sge/doc'

  # ─── JVM compile + test (uses Panama provider JARs) ─────────────────

  test-jvm:
    name: JVM tests (${{ matrix.label }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            label: linux-x86_64
            platform: linux-x86_64
          - os: ubuntu-24.04-arm
            label: linux-aarch64
            platform: linux-aarch64
          - os: macos-latest
            label: macos-aarch64
            platform: macos-aarch64
          - os: windows-latest
            label: windows-x86_64
            platform: windows-x86_64
          - os: windows-11-arm
            label: windows-aarch64
            platform: windows-aarch64
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - uses: actions/setup-java@v4
        with:
          distribution: ${{ env.JAVA_DISTRIBUTION }}
          java-version: ${{ env.JAVA_VERSION }}
          cache: sbt

      - uses: sbt/setup-sbt@v1

      - name: Extract JVM native libs from provider JARs
        shell: bash
        run: |
          DEST="sge-deps/native-components/target/release"
          mkdir -p "$DEST"
          PLATFORM="${{ matrix.platform }}"
          BASE_URL="${{ env.SONATYPE_SNAPSHOTS }}/com/kubuszok"

          # Download and extract panama-sge-core-provider
          OPS_JAR="/tmp/panama-sge-core.jar"
          curl -fSL -o "$OPS_JAR" "${BASE_URL}/panama-sge-core-provider/${{ env.NATIVE_COMPONENTS_VERSION }}/panama-sge-core-provider-${{ env.NATIVE_COMPONENTS_VERSION }}.jar"
          cd /tmp && jar xf "$OPS_JAR" "native/${PLATFORM}/" && cd -
          cp /tmp/native/${PLATFORM}/* "$DEST/" 2>/dev/null || true

          # Download and extract panama-angle-provider
          ANGLE_JAR="/tmp/panama-angle.jar"
          curl -fSL -o "$ANGLE_JAR" "${BASE_URL}/panama-angle-provider/${{ env.NATIVE_COMPONENTS_VERSION }}/panama-angle-provider-${{ env.NATIVE_COMPONENTS_VERSION }}.jar"
          cd /tmp && jar xf "$ANGLE_JAR" "native/${PLATFORM}/" && cd -
          cp /tmp/native/${PLATFORM}/* "$DEST/" 2>/dev/null || true

          # Download and extract panama-sge-freetype-provider
          FT_JAR="/tmp/panama-sge-freetype.jar"
          curl -fSL -o "$FT_JAR" "${BASE_URL}/panama-sge-freetype-provider/${{ env.NATIVE_COMPONENTS_VERSION }}/panama-sge-freetype-provider-${{ env.NATIVE_COMPONENTS_VERSION }}.jar"
          cd /tmp && jar xf "$FT_JAR" "native/${PLATFORM}/" && cd -
          cp /tmp/native/${PLATFORM}/* "$DEST/" 2>/dev/null || true

          # Download and extract panama-sge-physics-provider
          PHYS_JAR="/tmp/panama-sge-physics.jar"
          curl -fSL -o "$PHYS_JAR" "${BASE_URL}/panama-sge-physics-provider/${{ env.NATIVE_COMPONENTS_VERSION }}/panama-sge-physics-provider-${{ env.NATIVE_COMPONENTS_VERSION }}.jar"
          cd /tmp && jar xf "$PHYS_JAR" "native/${PLATFORM}/" && cd -
          cp /tmp/native/${PLATFORM}/* "$DEST/" 2>/dev/null || true

          echo "=== Extracted JVM native libs ==="
          ls -la "$DEST/"

      - name: Run JVM tests
        run: sbt 'sge/test'

  # ─── Browser integration tests (Scala.js + Playwright) ─────────────

  test-browser-it:
    name: Browser tests
    needs: [test-js]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: ${{ env.JAVA_DISTRIBUTION }}
          java-version: ${{ env.JAVA_VERSION }}
          cache: sbt

      - uses: sbt/setup-sbt@v1

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Publish SGE to local Maven
        run: sbt 'sge/publishM2; sgeJS/publishM2; writeDemoVersion'
        env:
          SGE_SKIP_NATIVE_VALIDATION: "true"

      - name: Publish sge-build plugin to Ivy local
        working-directory: sge-build
        run: sbt publishLocal

      - name: Compile regression test JS for browser bootstrap test
        run: sbt 'regressionTestJS/fastLinkJS'

      - name: Compile demo JS for browser smoke tests
        working-directory: demos
        run: sbt 'pongJS/fastLinkJS; spaceShooterJS/fastLinkJS; curvePlaygroundJS/fastLinkJS; viewportGalleryJS/fastLinkJS; shaderLabJS/fastLinkJS; tileWorldJS/fastLinkJS; hexTacticsJS/fastLinkJS; netChatJS/fastLinkJS; viewer3dJS/fastLinkJS; assetShowcaseJS/fastLinkJS; particleShowJS/fastLinkJS'

      - name: Install Playwright
        run: npx --yes playwright install --with-deps chromium

      - name: Run browser integration tests
        run: sbt 'sge-it-browser/test'

  # ─── Scala Native tests (uses provider JARs from Sonatype) ──────────

  test-native:
    name: Scala Native tests (${{ matrix.label }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            label: linux-x86_64
            platform: linux-x86_64
          - os: ubuntu-24.04-arm
            label: linux-aarch64
            platform: linux-aarch64
          - os: macos-latest
            label: macos-aarch64
            platform: macos-aarch64
          - os: windows-latest
            label: windows-x86_64
            platform: windows-x86_64
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - uses: actions/setup-java@v4
        with:
          distribution: ${{ env.JAVA_DISTRIBUTION }}
          java-version: ${{ env.JAVA_VERSION }}
          cache: sbt

      - uses: sbt/setup-sbt@v1

      - name: Install Scala Native system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y clang
          sudo apt-get install -y libstdc++-12-dev || sudo apt-get install -y libstdc++-14-dev || true

      - name: Install Scala Native system dependencies (Windows)
        if: runner.os == 'Windows'
        run: choco install llvm --yes

      - name: Run Scala Native tests
        run: sbt 'sgeNative/test'
        env:
          SGE_SKIP_NATIVE_VALIDATION: "true"

      - name: Run native FFI validation (headless)
        if: runner.os != 'Windows'
        run: sbt 'sge-it-native-ffi/run -- --headless'
        env:
          SGE_SKIP_NATIVE_VALIDATION: "true"

  # ─── Android smoke + integration tests (emulator) ──────────────

  test-android:
    name: Android tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - uses: actions/setup-java@v4
        with:
          distribution: ${{ env.JAVA_DISTRIBUTION }}
          java-version: ${{ env.JAVA_VERSION }}
          cache: sbt

      - uses: sbt/setup-sbt@v1

      - name: Extract Android native libs from provider JAR
        shell: bash
        run: |
          ANDROID_JAR="/tmp/android-sge-core.jar"
          curl -fSL -o "$ANDROID_JAR" "${{ env.SONATYPE_SNAPSHOTS }}/com/kubuszok/android-sge-core-provider/${{ env.NATIVE_COMPONENTS_VERSION }}/android-sge-core-provider-${{ env.NATIVE_COMPONENTS_VERSION }}.jar"
          jar xf "$ANDROID_JAR" native/
          # Move to the expected layout for AndroidBuild
          for entry in native/android-*; do
            classifier=$(basename "$entry")
            case "$classifier" in
              android-aarch64) abi="arm64-v8a" ; rust="aarch64-linux-android" ;;
              android-armv7)   abi="armeabi-v7a" ; rust="armv7-linux-androideabi" ;;
              android-x86_64)  abi="x86_64" ; rust="x86_64-linux-android" ;;
            esac
            dest="sge-deps/native-components/target/$rust/release"
            mkdir -p "$dest"
            cp "$entry"/* "$dest/"
          done
          rm -rf native

      - name: Extract JVM native libs for publishM2
        shell: bash
        run: |
          BASE_URL="${{ env.SONATYPE_SNAPSHOTS }}/com/kubuszok"
          OPS_JAR="/tmp/panama-sge-core.jar"
          curl -fSL -o "$OPS_JAR" "${BASE_URL}/panama-sge-core-provider/${{ env.NATIVE_COMPONENTS_VERSION }}/panama-sge-core-provider-${{ env.NATIVE_COMPONENTS_VERSION }}.jar"
          ANGLE_JAR="/tmp/panama-angle.jar"
          curl -fSL -o "$ANGLE_JAR" "${BASE_URL}/panama-angle-provider/${{ env.NATIVE_COMPONENTS_VERSION }}/panama-angle-provider-${{ env.NATIVE_COMPONENTS_VERSION }}.jar"
          FT_JAR="/tmp/panama-sge-freetype.jar"
          curl -fSL -o "$FT_JAR" "${BASE_URL}/panama-sge-freetype-provider/${{ env.NATIVE_COMPONENTS_VERSION }}/panama-sge-freetype-provider-${{ env.NATIVE_COMPONENTS_VERSION }}.jar"
          PHYS_JAR="/tmp/panama-sge-physics.jar"
          curl -fSL -o "$PHYS_JAR" "${BASE_URL}/panama-sge-physics-provider/${{ env.NATIVE_COMPONENTS_VERSION }}/panama-sge-physics-provider-${{ env.NATIVE_COMPONENTS_VERSION }}.jar"
          DEST="sge-deps/native-components/target/cross"
          mkdir -p "$DEST"
          cd /tmp && jar xf "$OPS_JAR" native/ && jar xf "$ANGLE_JAR" native/ && jar xf "$FT_JAR" native/ && jar xf "$PHYS_JAR" native/ && cd -
          cp -r /tmp/native/* "$DEST/"
          rm -rf /tmp/native
          # Also copy to release dir for host platform
          mkdir -p sge-deps/native-components/target/release
          cp "$DEST/linux-x86_64/"* sge-deps/native-components/target/release/ 2>/dev/null || true

      - name: Publish SGE to local Maven (all platforms)
        run: sbt 'sge/publishM2; writeDemoVersion'
        env:
          SGE_SKIP_NATIVE_VALIDATION: "true"

      - name: Publish sge-build plugin to Ivy local
        working-directory: sge-build
        run: sbt publishLocal

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Android smoke tests
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 35
          target: google_apis
          arch: x86_64
          force-avd-creation: false
          emulator-options: -no-window -gpu swiftshader_indirect -no-snapshot -noaudio -no-boot-anim -no-metrics
          disable-animations: true
          script: sbt 'sge-android-smoke/test'

  # ─── Demo smoke (Scala.js) ──────────────────────────────────────

  demo-smoke-js:
    name: Demo smoke (JS)
    needs: [test-js]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: ${{ env.JAVA_DISTRIBUTION }}
          java-version: ${{ env.JAVA_VERSION }}
          cache: sbt

      - uses: sbt/setup-sbt@v1

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Publish SGE JS to local Maven
        run: sbt 'sge/publishM2; sgeJS/publishM2; writeDemoVersion'
        env:
          SGE_SKIP_NATIVE_VALIDATION: "true"

      - name: Publish sge-build plugin to Ivy local
        working-directory: sge-build
        run: sbt publishLocal

      - name: Compile Pong JS demo
        working-directory: demos
        run: sbt 'pongJS/fastLinkJS'

  # ─── Demo compile all (JVM + JS + Native) ──────────────────────

  demo-compile-all:
    name: Demo compile all
    needs: [test-js]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - uses: actions/setup-java@v4
        with:
          distribution: ${{ env.JAVA_DISTRIBUTION }}
          java-version: ${{ env.JAVA_VERSION }}
          cache: sbt

      - uses: sbt/setup-sbt@v1

      - name: Install Scala Native system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang
          sudo apt-get install -y libstdc++-12-dev || sudo apt-get install -y libstdc++-14-dev || true

      - name: Extract JVM native libs for publishM2
        shell: bash
        run: |
          BASE_URL="${{ env.SONATYPE_SNAPSHOTS }}/com/kubuszok"
          OPS_JAR="/tmp/panama-sge-core.jar"
          curl -fSL -o "$OPS_JAR" "${BASE_URL}/panama-sge-core-provider/${{ env.NATIVE_COMPONENTS_VERSION }}/panama-sge-core-provider-${{ env.NATIVE_COMPONENTS_VERSION }}.jar"
          ANGLE_JAR="/tmp/panama-angle.jar"
          curl -fSL -o "$ANGLE_JAR" "${BASE_URL}/panama-angle-provider/${{ env.NATIVE_COMPONENTS_VERSION }}/panama-angle-provider-${{ env.NATIVE_COMPONENTS_VERSION }}.jar"
          FT_JAR="/tmp/panama-sge-freetype.jar"
          curl -fSL -o "$FT_JAR" "${BASE_URL}/panama-sge-freetype-provider/${{ env.NATIVE_COMPONENTS_VERSION }}/panama-sge-freetype-provider-${{ env.NATIVE_COMPONENTS_VERSION }}.jar"
          PHYS_JAR="/tmp/panama-sge-physics.jar"
          curl -fSL -o "$PHYS_JAR" "${BASE_URL}/panama-sge-physics-provider/${{ env.NATIVE_COMPONENTS_VERSION }}/panama-sge-physics-provider-${{ env.NATIVE_COMPONENTS_VERSION }}.jar"
          DEST="sge-deps/native-components/target/cross"
          mkdir -p "$DEST"
          cd /tmp && jar xf "$OPS_JAR" native/ && jar xf "$ANGLE_JAR" native/ && jar xf "$FT_JAR" native/ && jar xf "$PHYS_JAR" native/ && cd -
          cp -r /tmp/native/* "$DEST/"
          rm -rf /tmp/native
          mkdir -p sge-deps/native-components/target/release
          cp "$DEST/linux-x86_64/"* sge-deps/native-components/target/release/ 2>/dev/null || true

      - name: Publish SGE to local Maven (all platforms)
        run: sbt 'sge/publishM2; sgeJS/publishM2; sgeNative/publishM2; writeDemoVersion'
        env:
          SGE_SKIP_NATIVE_VALIDATION: "true"

      - name: Publish sge-build plugin to Ivy local
        working-directory: sge-build
        run: sbt publishLocal

      - name: Compile all demos (JVM + JS + Native)
        working-directory: demos
        run: sbt compile

      - name: Verify all demos link for Scala Native
        working-directory: demos
        run: |
          sbt 'pongNative/nativeLink; spaceShooterNative/nativeLink; curvePlaygroundNative/nativeLink; viewportGalleryNative/nativeLink; shaderLabNative/nativeLink; tileWorldNative/nativeLink; hexTacticsNative/nativeLink; viewer3dNative/nativeLink; particleShowNative/nativeLink; netChatNative/nativeLink; assetShowcaseNative/nativeLink'
        env:
          SGE_SKIP_NATIVE_VALIDATION: "true"

  # ─── Verify release packaging ──────────────────────────────────

  verify-release:
    name: Verify release (${{ matrix.label }})
    needs: [test-jvm, test-native]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            label: linux-x86_64
            platform: linux-x86_64
            native: true
          - os: ubuntu-24.04-arm
            label: linux-aarch64
            platform: linux-aarch64
            native: true
          - os: macos-latest
            label: macos-aarch64
            platform: macos-aarch64
            native: true
          - os: windows-latest
            label: windows-x86_64
            platform: windows-x86_64
            native: false
          - os: windows-11-arm
            label: windows-aarch64
            platform: windows-aarch64
            native: false
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - uses: actions/setup-java@v4
        with:
          distribution: ${{ env.JAVA_DISTRIBUTION }}
          java-version: ${{ env.JAVA_VERSION }}
          cache: sbt

      - uses: sbt/setup-sbt@v1

      - name: Install Scala Native system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y clang
          sudo apt-get install -y libstdc++-12-dev || sudo apt-get install -y libstdc++-14-dev || true

      - name: Extract JVM native libs from provider JARs
        shell: bash
        run: |
          DEST="sge-deps/native-components/target/release"
          mkdir -p "$DEST"
          PLATFORM="${{ matrix.platform }}"
          BASE_URL="${{ env.SONATYPE_SNAPSHOTS }}/com/kubuszok"
          OPS_JAR="/tmp/panama-sge-core.jar"
          curl -fSL -o "$OPS_JAR" "${BASE_URL}/panama-sge-core-provider/${{ env.NATIVE_COMPONENTS_VERSION }}/panama-sge-core-provider-${{ env.NATIVE_COMPONENTS_VERSION }}.jar"
          ANGLE_JAR="/tmp/panama-angle.jar"
          curl -fSL -o "$ANGLE_JAR" "${BASE_URL}/panama-angle-provider/${{ env.NATIVE_COMPONENTS_VERSION }}/panama-angle-provider-${{ env.NATIVE_COMPONENTS_VERSION }}.jar"
          FT_JAR="/tmp/panama-sge-freetype.jar"
          curl -fSL -o "$FT_JAR" "${BASE_URL}/panama-sge-freetype-provider/${{ env.NATIVE_COMPONENTS_VERSION }}/panama-sge-freetype-provider-${{ env.NATIVE_COMPONENTS_VERSION }}.jar"
          PHYS_JAR="/tmp/panama-sge-physics.jar"
          curl -fSL -o "$PHYS_JAR" "${BASE_URL}/panama-sge-physics-provider/${{ env.NATIVE_COMPONENTS_VERSION }}/panama-sge-physics-provider-${{ env.NATIVE_COMPONENTS_VERSION }}.jar"
          cd /tmp && jar xf "$OPS_JAR" "native/${PLATFORM}/" && jar xf "$ANGLE_JAR" "native/${PLATFORM}/" && jar xf "$FT_JAR" "native/${PLATFORM}/" && jar xf "$PHYS_JAR" "native/${PLATFORM}/" && cd -
          cp /tmp/native/${PLATFORM}/* "$DEST/" 2>/dev/null || true
          # Also need cross dir for JVM JAR packaging
          CROSS_DEST="sge-deps/native-components/target/cross"
          mkdir -p "$CROSS_DEST"
          cd /tmp && rm -rf native && jar xf "$OPS_JAR" native/ && jar xf "$ANGLE_JAR" native/ && jar xf "$FT_JAR" native/ && jar xf "$PHYS_JAR" native/ && cd -
          cp -r /tmp/native/* "$CROSS_DEST/"
          rm -rf /tmp/native

      - name: Publish SGE to local Maven (all platforms)
        run: sbt 'sge/publishM2; sgeJS/publishM2; sgeNative/publishM2; writeDemoVersion'
        env:
          SGE_SKIP_NATIVE_VALIDATION: "true"

      - name: Publish sge-build plugin to Ivy local
        working-directory: sge-build
        run: sbt publishLocal

      - name: Build Pong JVM release
        working-directory: demos
        run: sbt 'pong/sgePackage'

      - name: Build Pong Native release
        if: matrix.native
        working-directory: demos
        run: sbt 'pongNative/nativeLink'
