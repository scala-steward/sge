# SGE-specific runner adapters. Invoke with `re-scale runner <name>
# [--mode MODE]`. Each runner shells out to an actual sbt task / external
# command — these are thin wrappers, not new build logic.

runners:

  # ── Integration test runners ──────────────────────────────────────

  desktop-it:
    description: "Desktop integration tests (GLFW + ANGLE + miniaudio + JSON/XML)"
    invoke:
      command: sbt
      args: [--client, "sge-it-desktop/test"]
    output:
      failure:
        keep-lines-matching: ["FAIL", "ERROR", "Caused by", "munit"]
        max-lines: 30

  browser-it:
    description: "Browser integration tests via Playwright + headless Chromium"
    invoke:
      command: sbt
      args: [--client, "sge-it-browser/test"]
    output:
      failure:
        keep-lines-matching: ["FAIL", "Error", "page.evaluate", "ReferenceError", "TypeError"]
        max-lines: 30

  android-it:
    description: "Android integration tests on emulator (deploys smoke APK, monitors logcat)"
    invoke:
      command: sbt
      args: [--client, "sge-it-android/test"]
    output:
      failure:
        keep-lines-matching: ["FATAL", "AndroidRuntime", "FAIL", "Caused by"]
        max-lines: 40

  jvm-platform-it:
    description: "JVM platform provider discovery tests (PanamaProvider, JdkPanama)"
    invoke:
      command: sbt
      args: [--client, "sge-it-jvm-platform/test"]

  native-ffi-it:
    description: "Scala Native FFI wiring validation (every native C ABI endpoint)"
    invoke:
      command: sbt
      args: [--client, "sge-it-native-ffi/run"]

  android-smoke-build:
    description: "Build the Android smoke test APK (used by android-it runner)"
    invoke:
      command: sbt
      args: [--client, "sge-android-smoke/androidSign"]

  # ── Demo release runners ──────────────────────────────────────────
  # All run inside the demos/ sub-build (cwd: demos).

  release-build:
    description: "Build all 11 demo release archives (JVM + Browser + Native + Android)"
    invoke:
      command: sbt
      args: [--client, releaseAll]
      cwd: demos
    modes:
      all: {}
      pong: {}
      space-shooter: {}
      tile-world: {}
      hex-tactics: {}
      curves: {}
      shader-lab: {}
      viewer-3d: {}
      particles: {}
      net-chat: {}
      viewports: {}
      assets: {}
    # NB: per-demo modes are wired by hand in commands below — see
    # `re-scale runner release-build --mode pong` which the wrapper
    # interprets as `sbt --client releasePong`.

  release-collect:
    description: "Collect demo release archives into demos/target/releases/"
    invoke:
      command: sbt
      args: [--client, collectReleases]
      cwd: demos

  android-build-all:
    description: "Build all 11 demo APKs"
    invoke:
      command: sbt
      args: [--client, androidAll]
      cwd: demos

  # ── Red-green resolve gate (ISS-487) ──────────────────────────────
  # Mandatory gate for every bug issue: prove the named suite FAILS by
  # assertion at <red-sha> (sbt exit nonzero AND munit failures summed
  # >0), PASSES at <fix-sha> (sbt exit 0 AND 0 failures), and that the
  # fix commit does not touch ANY test-scope file the red commit added.
  # The suite is run by its EXACT resolved FQCN(s), never a `*glob*`.
  # Additionally: a red phase that fails to compile is a FALSE RED
  # (compile-error-red) and fails the gate; a red commit that touches
  # main sources is rejected (red-touches-main).
  #
  # Invoke (JVM, default):
  #   re-scale runner red-green --mode run -- <module> <suite> <red-sha> <fix-sha>
  # Invoke (Scala Native, ISS-596):
  #   re-scale runner red-green --mode run -- <module> <suite> <red-sha> <fix-sha> native
  #
  # The four (or five) positional args fill $1..$5 in the `run` mode block,
  # which the wrapper writes to the mode-file; .rescale/scripts/red-green.sh
  # reads (and deletes) that file on entry, then runs the phases in a
  # throwaway git clone. The optional 5th arg is the platform: jvm (default)
  # or native. Native runs the projectMatrix variant `<module>Native/testOnly`
  # and parses the Scala Native result dialect (no munit per-run lines; only
  # the sbt `… Total N, Failed M, Errors E, Passed P` summary). Final stdout
  # line is exactly `RED-GREEN: PASS` or `RED-GREEN: FAIL — <reason>`; exit 0
  # only on PASS, exit 2 on an unparseable/truncated run (tool error), exit 1
  # otherwise.
  #
  # Permanent canary / probe set — re-run ALL of these on every audit of
  # the script (module sge-noise, suite Iss487CanarySuite unless noted):
  #   canary/iss487-pass         → RED-GREEN: PASS, exit 0
  #   canary/iss487-tamper       → FAIL tamper, exit 1
  #   canary/iss487-helpertamper → FAIL tamper, exit 1 (full-scope)
  #   canary/iss487-falsered     → FAIL compile-error-red, exit 1
  #   canary/iss487-maintouch    → FAIL red-touches-main, exit 1
  #   probe/iss487-shadow        → FAIL, exit 1 (no glob masking)
  #   probe/iss487-rename        → FAIL tamper, exit 1
  # ISS-596 Native set (suite Iss596CanarySuite, --platform native):
  #   canary/iss596-native         → RED-GREEN: PASS, exit 0
  #   canary/iss596-native-tamper  → FAIL tamper, exit 1
  # ISS-596 bounce-1 ran-at-all-guard probe set (each branch ships a runner
  # under sge-extension/noise/src/test/resources/iss596/; the `--classify`
  # self-test entrypoint exercises the live classifier without a full clone):
  #   probe/iss596-native-zerotest → vanished suite, `Total 0` rc=0 → exit 2
  #                                  (fail-closed) at green AND red phase; plus
  #                                  the bounce-2 SKIP fixture (Total 1, Passed
  #                                  0, Skipped 1) → no-summary on native
  #   probe/iss596-jvm-zerotest    → JVM mirror, incl. the adversarial
  #                                  started-marker+Total0 case the explicit
  #                                  executed-count guard catches; plus the
  #                                  bounce-2 SKIP fixture (auditor's exact
  #                                  `Total 1 … Passed 0, Skipped 1` rc=0) and
  #                                  a finding-B forged-red fixture (failures>0
  #                                  rc=0) → all no-summary (fail closed)
  #   probe/iss596-native-trunc    → tool error, exit 2 (truncated output)
  red-green:
    description: "Red-green resolve gate: suite fails at red-sha, passes at fix-sha, fix leaves the red test untouched"
    invoke:
      command: .rescale/scripts/red-green.sh
      args: ["target/red-green-mode.tsv"]
    mode-file:
      path: target/red-green-mode.tsv
      format: kv
    modes:
      run:
        module:   "$1"
        suite:    "$2"
        red:      "$3"
        fix:      "$4"
        # Optional 5th arg (ISS-596): jvm (default) | native. Absent/empty
        # ⇒ jvm, behavior-identical to the pre-ISS-596 JVM behavior except
        # that a no-summary / vanished-suite run now exits 2 (ISS-596
        # bounce 1 ran-at-all guard) instead of being mis-read as a pass.
        platform: "$5"
    output:
      failure:
        keep-lines-matching: ["RED-GREEN:", "compile-error-red", "TAMPER", "assertion", "[error]", "failed,", "Failed: Total"]
        max-lines: 40

  # ── Convenience scanners ──────────────────────────────────────────

  shortcuts-extensions:
    description: "Shortcut scan filtered to sge-extension/ only"
    invoke:
      command: re-scale
      args: [enforce, shortcuts, --src, sge-extension]

  verify-extensions:
    description: "Covenant verify filtered to sge-extension/ only"
    invoke:
      command: re-scale
      args: [enforce, verify, --all, --src, sge-extension]
